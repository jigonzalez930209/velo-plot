<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>velo-plot E2E Harness</title>
  <style>
    body { margin: 0; background: #0b0e14; color: #94a3b8; font-family: system-ui, sans-serif; }
    #host { width: 100vw; height: 100vh; min-height: 420px; }
    #status { position: fixed; top: 8px; left: 8px; font-size: 12px; z-index: 9; pointer-events: none; }
  </style>
</head>
<body>
  <div id="status">loading…</div>
  <div id="host"></div>
  <script>
    window.process = { env: { NODE_ENV: 'production' } };
    window.__VELO_E2E__ = { scenario: null, status: 'running', done: false };
  </script>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
    }
  }
  </script>
  <script type="module">
    import { runScenario, listScenarios } from './scenarios/index.mjs';

    const statusEl = document.getElementById('status');
    const params = new URLSearchParams(location.search);
    const scenario = params.get('scenario');

    window.__VELO_E2E__ = {
      scenario,
      status: 'running',
      done: false,
      scenarios: listScenarios(),
    };

    if (!scenario) {
      window.__VELO_E2E__ = {
        scenario: null,
        status: 'fail',
        done: true,
        error: 'Missing ?scenario= query param',
        scenarios: listScenarios(),
      };
      statusEl.textContent = 'missing scenario param';
    } else {
      statusEl.textContent = `running: ${scenario}`;
      try {
        const lib = await import('/dist/velo-plot.full.js');
        const result = await runScenario(scenario, lib);
        window.__VELO_E2E__ = { ...result, scenario };
        statusEl.textContent = `pass: ${scenario}`;
        statusEl.style.color = '#22c55e';
      } catch (err) {
        console.error(err);
        window.__VELO_E2E__ = {
          scenario,
          status: 'fail',
          done: true,
          error: err?.message ?? String(err),
        };
        statusEl.textContent = `fail: ${scenario}`;
        statusEl.style.color = '#ef4444';
      }
    }
  </script>
</body>
</html>
